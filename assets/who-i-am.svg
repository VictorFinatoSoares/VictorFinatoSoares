<svg width="560" height="320" viewBox="0 0 560 320" xmlns="http://www.w3.org/2000/svg" xml:space="preserve">
  <defs>
    <!-- Gradient border -->
    <linearGradient id="border" x1="0" y1="0" x2="560" y2="320" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#ff003c"/>
      <stop offset="48%" stop-color="#7b00ff"/>
      <stop offset="100%" stop-color="#00f5ff"/>
    </linearGradient>

    <!-- Glow red -->
    <filter id="glowR" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="3" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <!-- Glow cyan -->
    <filter id="glowC" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="3" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <!-- Border glow -->
    <filter id="outerGlow" x="-5%" y="-5%" width="110%" height="110%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="4" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Border -->
  <rect x="1" y="1" width="558" height="318" rx="13" fill="none"
        stroke="url(#border)" stroke-width="4" opacity="0.25"
        filter="url(#outerGlow)"/>

  <rect x="1" y="1" width="558" height="318" rx="13" fill="none"
        stroke="url(#border)" stroke-width="1.5"/>

  <!-- Background -->
  <rect x="2" y="2" width="556" height="316" rx="12" fill="#020509"/>

  <!-- Title bar -->
  <rect x="2" y="2" width="556" height="37" rx="12" fill="#020d18"/>
  <rect x="2" y="22" width="556" height="17" fill="#020d18"/>

  <!-- Window dots -->
  <circle cx="24" cy="20" r="5.5" fill="#ff003c"/>
  <circle cx="44" cy="20" r="5.5" fill="#f59e0b" opacity="0.8"/>
  <circle cx="64" cy="20" r="5.5" fill="#10b981" opacity="0.8"/>

  <!-- File name -->
  <text x="280" y="24.5" font-family="'Courier New', monospace"
        font-size="11" fill="#1e3d56" text-anchor="middle" letter-spacing="2.5">
        victor_finato.py
  </text>

  <!-- Divider -->
  <line x1="2" y1="39" x2="558" y2="39"
        stroke="url(#border)" stroke-width="0.8" opacity="0.55"/>

  <!-- Gutter -->
  <rect x="2" y="39" width="36" height="279" fill="#020b15"/>
  <line x1="38" y1="39" x2="38" y2="317" stroke="#0a1e30"/>



  <!-- CODE -->

  <!-- L1 -->
  <text x="48" y="61" font-family="'Courier New', monospace" font-size="13.5">
    <tspan fill="#ff003c">class </tspan>
    <tspan fill="#00f5ff">VictorFinato</tspan>
    <tspan fill="#7a8fa0">:</tspan>
  </text>

  <!-- L3 -->
  <text x="48" y="101" font-family="'Courier New', monospace"
        font-size="13.5" fill="#2b5070">
    # Téc. em ADS · Desenvolvedor · 2026
  </text>

  <!-- L4 -->
  <text x="48" y="121" font-family="'Courier New', monospace"
        font-size="13.5" fill="#2b5070">
    # Do papel à realidade — linha por linha.
  </text>

  <!-- L6 -->
  <text x="48" y="161" font-family="'Courier New', monospace" font-size="13.5">
    <tspan fill="#cdd6f4">linguagens</tspan>
    <tspan fill="#7a8fa0"> = ["HTML", "CSS", "JavaScript", "Python",</tspan>
  </text>

  <text x="48" y="181" font-family="'Courier New', monospace" font-size="13.5">
    <tspan fill="#7a8fa0">             "GDScript", "Java"]</tspan>
  </text>

  <!-- L7 -->
  <text x="48" y="201" font-family="'Courier New', monospace" font-size="13.5">
    <tspan fill="#cdd6f4">engine</tspan>
    <tspan fill="#7a8fa0"> = </tspan>
    <tspan fill="#00c4df">"Godot Engine 2D"</tspan>
  </text>

  <!-- L8 -->
  <text x="48" y="221" font-family="'Courier New', monospace" font-size="13.5">
    <tspan fill="#cdd6f4">origem</tspan>
    <tspan fill="#7a8fa0"> = </tspan>
    <tspan fill="#00c4df">"Sapucaia do Sul, RS — Brasil"</tspan>
  </text>


  <!-- L11 -->
  <text x="48" y="281" font-family="'Courier New', monospace" font-size="13.5">
    <tspan fill="#ff003c">def </tspan>
    <tspan fill="#00f5ff">missão</tspan>
    <tspan fill="#7a8fa0">(self) -> str:</tspan>
  </text>

  <!-- L12 -->
  <text x="48" y="301" font-family="'Courier New', monospace" font-size="13.5">
    <tspan fill="#ff003c">    return </tspan>
    <tspan fill="#00f5ff">"Transformar ideias em realidade."</tspan>
  </text>

  <!-- Cursor -->
  <rect x="415" y="289" width="7" height="14"
        fill="#00f5ff" opacity="0.7" rx="1"/>

</svg>

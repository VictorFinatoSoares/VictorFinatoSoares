name: Update GitHub Stats

on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Criar pasta de stats
        run: mkdir -p .github/stats

      - name: Buscar SVGs
        run: |
          curl -o .github/stats/stats-langs.svg "https://github-readme-stats-two-kappa-47.vercel.app/api/top-langs/?username=victorfinatosoares&layout=compact&count_private=true&langs_count=8&bg_color=020509&border_color=00f5ff&title_color=ffffff&text_color=a8d8e8"
          curl -o .github/stats/stats-general.svg "https://github-readme-stats-two-kappa-47.vercel.app/api?username=victorfinatosoares&show_icons=true&count_private=true&include_all_commits=true&theme=transparent&bg_color=020509&border_color=00f5ff&icon_color=00f5ff&title_color=ffffff&text_color=a8d8e8&rank_icon=github&hide_border=false"
          curl -o .github/stats/stats-streak.svg "https://streak-stats.demolab.com?user=victorfinatosoares&theme=transparent&background=020509&border=00f5ff&stroke=00f5ff&ring=ff003c&fire=ff003c&currStreakNum=ffffff&sideNums=ffffff&currStreakLabel=00f5ff&sideLabels=a8d8e8&dates=a8d8e8"

      - name: Commit e push se houver mudança
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .github/stats/
          git diff --cached --quiet || git commit -m "chore: update stats [skip ci]"
          git push